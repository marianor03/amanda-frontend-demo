<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Amanda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:ital,wght@0,300..800;1,300..800&family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/common.css">
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Amanda</h1>
                <p>Set New Password</p>
            </div>

            <div id="no-token-view" style="display:none;">
                <div class="error-message">
                    Invalid or missing reset link. Please request a new one.
                </div>
                <div style="margin-top: 20px;">
                    <a href="/auth/forgot-password.html" class="btn btn-primary" style="display:block; text-decoration:none; text-align:center;">
                        Request Reset Link
                    </a>
                </div>
            </div>

            <div id="success-view" style="display:none;">
                <div class="success-message">
                    Password reset successfully. You can now log in with your new password.
                </div>
                <div style="margin-top: 20px;">
                    <a href="/auth/login.html" class="btn btn-primary" style="display:block; text-decoration:none; text-align:center;">
                        Go to Login
                    </a>
                </div>
            </div>

            <form id="reset-form" class="auth-form">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="At least 8 characters"
                        required
                        minlength="8"
                        autocomplete="new-password"
                        autofocus
                    >
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm New Password</label>
                    <input
                        type="password"
                        id="confirm-password"
                        name="confirm-password"
                        placeholder="Re-enter your new password"
                        required
                        minlength="8"
                        autocomplete="new-password"
                    >
                </div>

                <div id="error-message" class="error-message" style="display: none;"></div>

                <button type="submit" class="btn btn-primary" id="submit-btn">
                    Reset Password
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { api } from '/static/js/api.js';

        const form = document.getElementById('reset-form');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirm-password');
        const errorMessage = document.getElementById('error-message');
        const submitBtn = document.getElementById('submit-btn');
        const successView = document.getElementById('success-view');
        const noTokenView = document.getElementById('no-token-view');

        const token = new URLSearchParams(window.location.search).get('token');

        if (!token) {
            form.style.display = 'none';
            noTokenView.style.display = 'block';
        }

        function setLoading(loading) {
            submitBtn.disabled = loading;
            submitBtn.textContent = loading ? 'Resetting…' : 'Reset Password';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.style.display = 'none';

            const password = passwordInput.value;
            const confirm = confirmInput.value;

            if (password.length < 8) {
                errorMessage.textContent = 'Password must be at least 8 characters long.';
                errorMessage.style.display = 'block';
                return;
            }

            if (password !== confirm) {
                errorMessage.textContent = 'Passwords do not match.';
                errorMessage.style.display = 'block';
                return;
            }

            setLoading(true);

            try {
                const result = await api.request('/api/auth/reset-password', {
                    method: 'POST',
                    body: JSON.stringify({ token, password })
                });

                if (result.data && result.data.success) {
                    form.style.display = 'none';
                    successView.style.display = 'block';
                } else {
                    errorMessage.textContent = result.data?.message || 'Reset failed. The link may have expired.';
                    errorMessage.style.display = 'block';
                    setLoading(false);
                }
            } catch {
                errorMessage.textContent = 'An error occurred. Please try again.';
                errorMessage.style.display = 'block';
                setLoading(false);
            }
        });
    </script>
</body>
</html>
