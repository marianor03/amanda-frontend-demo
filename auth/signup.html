<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Amanda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:ital,wght@0,300..800;1,300..800&family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/common.css">
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Amanda</h1>
                <p>Create Your Account</p>
            </div>
            
            <div id="success-view" style="display:none;">
                <div class="success-message" style="margin-bottom: 20px;">
                    Account created! Check your inbox and click the verification link to activate your account.
                </div>
                <p style="font-size:0.85rem; color: var(--text-secondary, #666); text-align:center;">
                    Didn't receive it? <a href="#" id="resend-link">Resend verification email</a>
                </p>
                <div id="resend-message" style="display:none; margin-top:12px;"></div>
            </div>

            <form id="signup-form" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Enter your email"
                        required
                        autocomplete="email"
                        autofocus
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="At least 8 characters"
                        required
                        minlength="8"
                        autocomplete="new-password"
                    >
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input
                        type="password"
                        id="confirm-password"
                        name="confirm-password"
                        placeholder="Re-enter your password"
                        required
                        minlength="8"
                        autocomplete="new-password"
                    >
                </div>

                <div id="error-message" class="error-message" style="display: none;"></div>

                <button type="submit" class="btn btn-primary" id="signup-btn">
                    Sign Up
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="/auth/login.html">Login</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { api } from '/static/js/api.js';

        const form = document.getElementById('signup-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirm-password');
        const errorMessage = document.getElementById('error-message');
        const signupBtn = document.getElementById('signup-btn');
        const successView = document.getElementById('success-view');
        const resendLink = document.getElementById('resend-link');
        const resendMessage = document.getElementById('resend-message');

        let registeredEmail = '';

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }

        function hideError() {
            errorMessage.style.display = 'none';
        }

        function setLoading(loading) {
            signupBtn.disabled = loading;
            signupBtn.textContent = loading ? 'Creating account...' : 'Sign Up';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (!email || !password || !confirmPassword) {
                showError('Please fill in all fields');
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('Please enter a valid email address');
                return;
            }

            if (password.length < 8) {
                showError('Password must be at least 8 characters long');
                return;
            }

            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            setLoading(true);

            try {
                const result = await api.signup(email, password);

                if (result.success && result.data.success) {
                    registeredEmail = email;
                    form.style.display = 'none';
                    document.querySelector('.auth-footer').style.display = 'none';
                    successView.style.display = 'block';
                } else {
                    showError(result.data.message || 'Signup failed. Please try again.');
                    setLoading(false);
                }
            } catch (error) {
                console.error('Signup error:', error);
                showError('An error occurred. Please try again.');
                setLoading(false);
            }
        });

        resendLink.addEventListener('click', async (e) => {
            e.preventDefault();
            resendLink.textContent = 'Sending…';
            try {
                await api.request('/api/auth/resend-verification', {
                    method: 'POST',
                    body: JSON.stringify({ email: registeredEmail })
                });
                resendMessage.className = 'success-message';
                resendMessage.textContent = 'Verification email resent. Check your inbox.';
            } catch {
                resendMessage.className = 'error-message';
                resendMessage.textContent = 'Could not resend. Please try again.';
            }
            resendMessage.style.display = 'block';
            resendLink.textContent = 'Resend verification email';
        });

        emailInput.focus();
    </script>
</body>
</html>
