<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Amanda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:ital,wght@0,300..800;1,300..800&family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/common.css">
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Amanda</h1>
                <p>Reset Your Password</p>
            </div>

            <div id="success-view" style="display:none;">
                <div class="success-message">
                    If that email is registered, a password reset link has been sent. Check your inbox.
                </div>
                <div style="margin-top: 20px; text-align: center;">
                    <a href="/auth/login.html" class="btn btn-primary" style="display:block; text-decoration:none; text-align:center;">
                        Back to Login
                    </a>
                </div>
            </div>

            <form id="forgot-form" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Enter your account email"
                        required
                        autocomplete="email"
                        autofocus
                    >
                </div>

                <div id="error-message" class="error-message" style="display: none;"></div>

                <button type="submit" class="btn btn-primary" id="submit-btn">
                    Send Reset Link
                </button>
            </form>

            <div class="auth-footer">
                <p><a href="/auth/login.html">Back to Login</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { api } from '/static/js/api.js';

        const form = document.getElementById('forgot-form');
        const emailInput = document.getElementById('email');
        const errorMessage = document.getElementById('error-message');
        const submitBtn = document.getElementById('submit-btn');
        const successView = document.getElementById('success-view');

        function setLoading(loading) {
            submitBtn.disabled = loading;
            submitBtn.textContent = loading ? 'Sending…' : 'Send Reset Link';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.style.display = 'none';

            const email = emailInput.value.trim();
            if (!email) {
                errorMessage.textContent = 'Please enter your email address.';
                errorMessage.style.display = 'block';
                return;
            }

            setLoading(true);

            try {
                await api.request('/api/auth/forgot-password', {
                    method: 'POST',
                    body: JSON.stringify({ email })
                });

                form.style.display = 'none';
                document.querySelector('.auth-footer').style.display = 'none';
                successView.style.display = 'block';
            } catch {
                errorMessage.textContent = 'An error occurred. Please try again.';
                errorMessage.style.display = 'block';
                setLoading(false);
            }
        });

        emailInput.focus();
    </script>
</body>
</html>
