<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Amanda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:ital,wght@0,300..800;1,300..800&family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/common.css">
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Amanda</h1>
                <p>Your Relationship Support Companion</p>
            </div>
            
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="Enter your email"
                        required 
                        autocomplete="email"
                        autofocus
                    >
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                </div>
                
                <div id="error-message" class="error-message" style="display: none;"></div>
                <div id="unverified-message" style="display:none; margin-top: 8px; font-size: 0.85rem; text-align: center; color: var(--text-secondary, #666);">
                    <a href="#" id="resend-link">Resend verification email</a>
                </div>
                <div id="resend-message" style="display:none; margin-top:8px;"></div>

                <button type="submit" class="btn btn-primary" id="login-btn">
                    Login
                </button>
            </form>

            <div class="auth-footer">
                <p><a href="/auth/forgot-password.html">Forgot your password?</a></p>
                <p>Don't have an account? <a href="/auth/signup.html">Sign up</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { api } from '/static/js/api.js';

        const form = document.getElementById('login-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('error-message');
        const unverifiedMessage = document.getElementById('unverified-message');
        const resendLink = document.getElementById('resend-link');
        const resendMessage = document.getElementById('resend-message');
        const loginBtn = document.getElementById('login-btn');

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            unverifiedMessage.style.display = 'none';
        }

        function hideError() {
            errorMessage.style.display = 'none';
            unverifiedMessage.style.display = 'none';
            resendMessage.style.display = 'none';
        }

        function setLoading(loading) {
            loginBtn.disabled = loading;
            loginBtn.textContent = loading ? 'Logging in...' : 'Login';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showError('Please fill in all fields');
                return;
            }

            setLoading(true);

            try {
                const result = await api.login(email, password);

                if (result.success && result.data.success) {
                    window.location.href = '/dashboard/';
                } else if (result.status === 403) {
                    // Unverified account
                    errorMessage.textContent = result.data.message || 'Please verify your email before logging in.';
                    errorMessage.style.display = 'block';
                    unverifiedMessage.style.display = 'block';
                    setLoading(false);
                } else {
                    showError(result.data.message || 'Login failed. Please try again.');
                    setLoading(false);
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('An error occurred. Please try again.');
                setLoading(false);
            }
        });

        resendLink.addEventListener('click', async (e) => {
            e.preventDefault();
            resendLink.textContent = 'Sending…';
            try {
                await api.request('/api/auth/resend-verification', {
                    method: 'POST',
                    body: JSON.stringify({ email: emailInput.value.trim() })
                });
                resendMessage.className = 'success-message';
                resendMessage.textContent = 'Verification email sent. Check your inbox.';
            } catch {
                resendMessage.className = 'error-message';
                resendMessage.textContent = 'Could not resend. Please try again.';
            }
            resendMessage.style.display = 'block';
            resendLink.textContent = 'Resend verification email';
        });

        emailInput.focus();
    </script>
  <script src="/static/js/page-loader.js"></script>
</body>
</html>
