<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

    <!-- Google Fonts – Funnel Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Funnel+Sans:ital,wght@0,300..800;1,300..800&family=Lexend+Deca:wght@100..900&display=swap"
    >

    <title>Amanda</title>
    <link rel="stylesheet" href="./css/style.css">
  </head>

  <body>
    <!-- Page content -->
    <div class="page">

      <!-- Top navigation -->
      <div id="nav-overlay"></div>
      <header class="navbar">
        <div class="brand"><img src="./images/amanda-logo.png" alt="Amanda" class="brand-logo"></div>
        <nav class="navlinks" aria-label="Primary">
          <a href="./landing.html">Home</a>
          <a href="./about.html">About</a>
          <a href="./contact.html">Contact</a>
          <a href="./terms.html">Terms</a>
          <a href="/auth/login.html">Sign in</a>
        </nav>
        <button id="nav-toggle" class="nav-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="primary-nav">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
      </header>

      <!-- Center hero section -->
      <main class="hero">
        <div class="hero-card">
          <div class="avatar">
            <img class="avatar-img" src="./images/Amanda.jpg" alt="Amanda">
          </div>

          <p class="eyebrow">Private &bull; Always here</p>
          <h1>Hello, I'm <img src="./images/amanda-logo.png" alt="Amanda" class="hero-logo"></h1>
          <p class="tagline">Your personal AI therapist. I'm here to help you feel heard.</p>

          <div class="cta">
            <a class="u-btn" href="/auth/login.html">
              <svg
                class="u-sparkle"
                width="20"
                height="20"
                fill="#FFFFFF"
                viewBox="0 0 24 24"
                data-name="Layer 1"
                id="Layer_1"
                aria-hidden="true"
              >
                <path d="M10,21.236,6.755,14.745.264,11.5,6.755,8.255,10,1.764l3.245,6.491L19.736,11.5l-6.491,3.245ZM18,21l1.5,3L21,21l3-1.5L21,18l-1.5-3L18,18l-3,1.5Z"/>
              </svg>
              <span class="u-text">Talk to me!</span>
            </a>
            <a class="link-cta" href="./about.html">How it works &rarr;</a>
          </div>
        </div>
      </main>

      <footer class="page-footer">
        <div class="trust">
          <span class="trust__item">Not a substitute for emergency services.</span>
          <span class="dot">&middot;</span>
          <span class="trust__item">You're in control of what you share.</span>
        </div>
      </footer>

    </div>

  <script type="module">
    import { api } from './static/js/api.js';
    // If already logged in, skip landing and go straight to chat
    try {
      const result = await api.checkAuth();
      if (result.success && result.data.authenticated) {
        window.location.href = '/dashboard/';
      }
    } catch (_) {}
  </script>
    <script src="/static/js/page-loader.js"></script>
    <script src="./js/nav.js"></script>
</body>
</html>
