<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Funnel+Sans:ital,wght@0,300..800;1,300..800&family=Lexend+Deca:wght@100..900&display=swap">
    <title>Contact – Amanda</title>
    <link rel="stylesheet" href="./css/style.css">
  </head>

  <body class="content-page">
    <div class="page">

      <div id="nav-overlay"></div>
      <header class="navbar">
        <span class="brand"><img src="./images/amanda-logo.png" alt="Amanda" class="brand-logo"></span>
        <nav class="navlinks" aria-label="Primary">
          <a href="./landing.html">Home</a>
          <a href="./about.html">About</a>
          <a href="./contact.html">Contact</a>
          <a href="./terms.html">Terms</a>
          <a href="/auth/login.html">Sign in</a>
        </nav>
        <button id="nav-toggle" class="nav-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="primary-nav">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
      </header>

      <main class="content-body">

        <div class="content-hero">
          <p class="eyebrow">Get in touch</p>
          <h1>Contact</h1>
          <p class="tagline">
            Have questions or feedback about Amanda? Reach out and we'll get back to you as soon as possible.
          </p>
        </div>

        <form class="contact-form" onsubmit="handleSubmit(event)">
          <h2>Send us a message</h2>

          <div class="form-group">
            <label for="name">Full name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required>
          </div>

          <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="Tell us what's on your mind..." required></textarea>
          </div>

          <button type="submit" class="form-submit">Send message</button>

          <p id="form-status" style="margin:0; font-size:0.85rem; color:rgba(255,255,255,0.75); display:none;"></p>
        </form>

      </main>

      <footer class="page-footer">
        <div class="trust">
          <span class="trust__item">Not a substitute for emergency services.</span>
          <span class="dot">&middot;</span>
          <span class="trust__item">You're in control of what you share.</span>
        </div>
      </footer>

    </div>

    <script src="./js/background-loader.js"></script>
    <script src="./js/nav.js"></script>
    <script>
      function handleSubmit(e) {
        e.preventDefault();
        const status = document.getElementById('form-status');
        status.textContent = 'Thanks for your message! We\'ll get back to you soon.';
        status.style.display = 'block';
        e.target.reset();
      }
    </script>
  </body>
</html>
